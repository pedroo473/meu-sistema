<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Empresas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h2 class="mb-4">📊 Sistema de Empresas</h2>

    <!-- 🔎 BUSCA -->
    <form method="GET" class="mb-3 d-flex">
        <input type="text" name="busca" class="form-control me-2" placeholder="Buscar..." value="{{ busca }}">
        <button class="btn btn-primary">Buscar</button>
    </form>

    <!-- ➕ CADASTRO -->
    <div class="card p-3 mb-4">
        <h5>Adicionar Empresa/Pessoa</h5>
        <form method="POST" action="/add">
            <div class="row">
                <div class="col"><input name="nome" class="form-control" placeholder="Nome"></div>
                <div class="col"><input name="cpf" class="form-control" placeholder="CPF/CNPJ"></div>
                <div class="col"><input name="celular" class="form-control" placeholder="Celular"></div>
                <div class="col"><input name="uf" class="form-control" placeholder="UF"></div>
            </div>
            <div class="row mt-2">
                <div class="col"><input name="cidade" class="form-control" placeholder="Cidade"></div>
                <div class="col"><input name="bairro" class="form-control" placeholder="Bairro"></div>
                <div class="col"><input name="cep" class="form-control" placeholder="CEP"></div>
                <div class="col"><input name="endereco" class="form-control" placeholder="Endereço"></div>
                <div class="col"><input name="numero" class="form-control" placeholder="Número"></div>
            </div>
            <button class="btn btn-success mt-3">Salvar</button>
        </form>
    </div>

    <!-- 📤 IMPORTAR / EXPORTAR -->
    <div class="mb-3 d-flex gap-2">
        <a href="/export" class="btn btn-secondary">⬇ Exportar Excel</a>

        <form action="/import" method="POST" enctype="multipart/form-data" class="d-flex">
            <input type="file" name="file" class="form-control me-2" accept=".xlsx" required>
            <button class="btn btn-warning">Importar</button>
        </form>
    </div>

    <!-- 📋 TABELA -->
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>CPF/CNPJ</th>
                <th>Celular</th>
                <th>Cidade</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for d in dados %}
            <tr>
                <td>{{ d["ID"] }}</td>
                <td>{{ d["Nome"] }}</td>
                <td>{{ d["CPF/CNPJ"] }}</td>
                <td>{{ d["Celular"] }}</td>
                <td>{{ d["Cidade"] }}</td>
                <td>
                    <a href="/edit/{{ d['ID'] }}" class="btn btn-sm btn-primary">Editar</a>
                    <a href="/delete/{{ d['ID'] }}" class="btn btn-sm btn-danger">Excluir</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
